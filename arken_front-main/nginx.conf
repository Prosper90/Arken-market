server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html — forces Telegram to always fetch the fresh entry point
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }

    # Vite asset bundles have content hashes in filenames — safe to cache long-term
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # React SPA — all other routes, also no-cache to ensure fresh loads
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to auth-service
    location /api/ {
        proxy_pass http://auth-service:4000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy Socket.io to market-service (with WebSocket upgrade)
    location /socket.io/ {
        proxy_pass http://market-service:3003/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
